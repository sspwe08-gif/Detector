<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spike Forecast Pro</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

#floatingApp{
    position:fixed;
    top:20px;
    right:20px;
    width:380px;
    background:#222;
    border-radius:10px;
    padding:15px;
    box-shadow:0 0 15px rgba(0,0,0,.5);
    z-index:9999;
}

input,button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    cursor:pointer;
}

.generate{
    background:#28a745;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #444;
    padding:6px;
    text-align:center;
}

th{
    background:#333;
}

.high{
    color:#4caf50;
    font-weight:bold;
}

.medium{
    color:#ffb300;
    font-weight:bold;
}

.low{
    color:#ff5252;
    font-weight:bold;
}

.small{
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div id="floatingApp">

    <h3>📈 Spike Forecast Pro</h3>

    <input
        id="time"
        placeholder="HH:MM"
        maxlength="5"
        oninput="autoColon(this)"
    >

    <input
        id="spike"
        type="number"
        step="0.01"
        placeholder="Latest Spike"
    >

    <button class="generate" onclick="generateForecast()">
        Generate Forecast
    </button>

    <button class="clear" onclick="clearHistory()">
        Clear History
    </button>

    <div id="result"></div>

</div>

<script>

function autoColon(field){

    let v = field.value.replace(/\D/g,'');

    if(v.length > 2){
        field.value =
            v.substring(0,2) +
            ":" +
            v.substring(2,4);
    }else{
        field.value = v;
    }
}

function parseTime(str){

    const p = str.split(":");

    if(p.length !== 2) return null;

    const h = Number(p[0]);
    const m = Number(p[1]);

    if(
        isNaN(h) ||
        isNaN(m) ||
        h < 0 ||
        h > 23 ||
        m < 0 ||
        m > 59
    ){
        return null;
    }

    return {h,m};
}

function formatTime(h,m){

    while(m >= 60){
        h++;
        m -= 60;
    }

    h %= 24;

    return (
        String(h).padStart(2,'0')
        + ":"
        + String(m).padStart(2,'0')
    );
}

function cleanHistory(history){

    return history
        .slice(-5)
        .map(v => Math.min(v,50));
}

function weightedAverage(history){

    const recent = cleanHistory(history);

    if(recent.length === 0) return 2;

    let totalWeight = 0;
    let weightedSum = 0;

    recent.forEach((value,index)=>{

        const weight = index + 1;

        weightedSum += value * weight;
        totalWeight += weight;

    });

    return weightedSum / totalWeight;
}

function calculateVolatility(history){

    const recent = cleanHistory(history);

    if(recent.length < 2) return 1;

    const avg =
        recent.reduce((a,b)=>a+b,0)
        / recent.length;

    const variance =
        recent.reduce(
            (s,v)=>s + Math.pow(v-avg,2),
            0
        ) / recent.length;

    return Math.sqrt(variance);
}

function trendFactor(history){

    const recent = cleanHistory(history);

    if(recent.length < 3)
        return 1;

    const a = recent[recent.length-3];
    const b = recent[recent.length-2];
    const c = recent[recent.length-1];

    if(a < b && b < c)
        return 1.20;

    if(a > b && b > c)
        return 0.80;

    return 1;
}

function classify(v){

    if(v < 2) return "low";

    if(v < 5) return "medium";

    return "high";
}

function clearHistory(){

    localStorage.removeItem("spikes");

    document.getElementById("result").innerHTML =
        "<p>History cleared.</p>";
}

function generateForecast(){

    const timeInput =
        document.getElementById("time").value.trim();

    const spike =
        parseFloat(
            document.getElementById("spike").value
        );

    const time =
        parseTime(timeInput);

    if(!time){

        alert("Enter time as HH:MM");
        return;
    }

    if(isNaN(spike) || spike <= 0){

        alert("Enter valid spike");
        return;
    }

    let history =
        JSON.parse(
            localStorage.getItem("spikes")
            || "[]"
        );

    history.push(spike);

    localStorage.setItem(
        "spikes",
        JSON.stringify(history)
    );

    const avg =
        weightedAverage(history);

    const trend =
        trendFactor(history);

    const vol =
        calculateVolatility(history);

    const baseline =
        avg * trend;

    let html = `
        <h3>Forecast</h3>

        <div class="small">
            Stored Rounds: ${history.length}<br>
            Weighted Avg: ${avg.toFixed(2)}x<br>
            Trend Factor: ${trend.toFixed(2)}<br>
            Baseline: ${baseline.toFixed(2)}x
        </div>

        <table>
        <tr>
            <th>Time</th>
            <th>Expected</th>
            <th>Range</th>
        </tr>
    `;

    for(let i=0;i<10;i++){

        let expected =
            baseline +
            ((Math.random()-0.5)
            * vol * 0.5);

        expected =
            Math.max(1,expected);

        let low =
            Math.max(
                1,
                expected * 0.75
            );

        let high =
            expected * 1.25;

        const cls =
            classify(expected);

        html += `
        <tr>
            <td>
                ${formatTime(
                    time.h,
                    time.m + i
                )}
            </td>

            <td class="${cls}">
                ${expected.toFixed(2)}x
            </td>

            <td>
                ${low.toFixed(1)}x -
                ${high.toFixed(1)}x
            </td>
        </tr>
        `;
    }

    html += "</table>";

    document.getElementById("result")
        .innerHTML = html;
}

</script>

</body>
</html>
