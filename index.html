<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spike Forecast Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0f1115;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:30px;
}
.container{max-width:1200px;margin:auto;}
h1{text-align:center;margin-bottom:25px;}
table{width:100%;border-collapse:collapse;margin-bottom:20px;}
th,td{border:1px solid #444;padding:10px;text-align:center;}
input{width:90%;padding:5px;text-align:center;}
button{
  display:block;
  margin:20px auto;
  padding:10px 20px;
  background:#1e90ff;
  border:none;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  border-radius:5px;
}
button:hover{background:#0077cc;}
#results{margin-top:20px;}
.low{color:#4caf50;}
.med{color:#ff9800;}
.high{color:#f44336;}
.purple{color:#9c27b0;}
.blue{color:#2196f3;}
.pink{color:#e91e63;font-weight:bold;}
</style>
</head>
<body>

<div class="container">
  <h1>📈 Spike Forecast Analyzer</h1>

  <table>
    <tr><th>Time</th><th>Spike</th></tr>
    <tr><td><input id="t1" placeholder="HH:MM" maxlength="5" oninput="autoColon(this)" onkeyup="fillTimes()"></td><td><input id="s1" type="number" step="0.01"></td></tr>
    <tr><td><input id="t2" placeholder="HH:MM" maxlength="5" oninput="autoColon(this)"></td><td><input id="s2" type="number" step="0.01"></td></tr>
    <tr><td><input id="t3" placeholder="HH:MM" maxlength="5" oninput="autoColon(this)"></td><td><input id="s3" type="number" step="0.01"></td></tr>
    <tr><td><input id="t4" placeholder="HH:MM" maxlength="5" oninput="autoColon(this)"></td><td><input id="s4" type="number" step="0.01"></td></tr>
    <tr><td><input id="t5" placeholder="HH:MM" maxlength="5" oninput="autoColon(this)"></td><td><input id="s5" type="number" step="0.01"></td></tr>
  </table>

  <button onclick="generateForecast()">Generate Forecast</button>
  <div id="results"></div>
</div>

<script>
function autoColon(input){
  let v=input.value.replace(/\D/g,'');
  if(v.length>4) v=v.substring(0,4);
  if(v.length>=3) v=v.substring(0,2)+":"+v.substring(2);
  input.value=v;
}
function parseTime(t){
  const p=t.split(":");
  if(p.length!==2) return null;
  const h=Number(p[0]), m=Number(p[1]);
  if(isNaN(h)||isNaN(m)||h<0||h>23||m<0||m>59) return null;
  return {h,m};
}
function fillTimes(){
  const first=document.getElementById("t1").value;
  const parsed=parseTime(first);
  if(!parsed) return;
  for(let i=2;i<=5;i++){
    let total=parsed.m+(i-1);
    let h=parsed.h+Math.floor(total/60);
    let m=total%60;
    document.getElementById("t"+i).value=String(h%24).padStart(2,'0')+":"+String(m).padStart(2,'0');
  }
}
function format(h,m){
  if(m>=60){h+=Math.floor(m/60);m%=60;}
  h=h%24;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// --- Volatility analysis ---
function analyze(spikes){
  if(spikes.length===0) return "med";
  let avg=spikes.reduce((a,b)=>a+b,0)/spikes.length;
  if(avg<2) return "low";
  if(avg<5) return "med";
  return "high";
}
function nextVol(current){
  const r=Math.random();
  if(current==="high"){
    if(r<0.5) return "high";
    if(r<0.8) return "med";
    return "low";
  }
  if(current==="med"){
    if(r<0.4) return "med";
    if(r<0.7) return "high";
    return "low";
  }
  if(r<0.5) return "low";
  if(r<0.85) return "med";
  return "high";
}

// --- Range generator with purple/blue build logic ---
function makeRange(vol, history){
  let purpleCount = history.filter(s => s >= 2 && s < 10).length;
  let blueCount = history.filter(s => s >= 1 && s < 2).length;

  let min, max, label="";
  if(vol==="low"){
    min=(1+Math.random()*1).toFixed(2);
    max=(2+Math.random()*1).toFixed(2);
    label="blue";
  } else if(vol==="med"){
    min=(2+Math.random()*2).toFixed(2);
    max=(8+Math.random()*4).toFixed(2);
    label="purple";
  } else {
    min=(5+Math.random()*5).toFixed(2);
    max=(20+Math.random()*20).toFixed(2);
    label="high";
  }

  // Build effect: purple or blue spikes can trigger pink
  if(purpleCount > 3 || blueCount > 2){
    if(Math.random() < 0.4){ // 40% chance
      min=(10+Math.random()*5).toFixed(2);
      max=(20+Math.random()*30).toFixed(2);
      label="pink";
    }
  }
  return {range:`${min}x – ${max}x`, label};
}

// --- Forecast generator ---
function generateForecast(){
  const spikes=[];
  for(let i=1;i<=5;i++){
    const s=parseFloat(document.getElementById("s"+i).value);
    if(!isNaN(s)) spikes.push(s);
  }
  if(spikes.length<1){
    document.getElementById("results").innerHTML="Enter at least 1 spike value";
    return;
  }

  let history=JSON.parse(localStorage.getItem("spikes")||"[]");
  history=history.concat(spikes);
  localStorage.setItem("spikes",JSON.stringify(history));

  let currentVol=analyze(history);
  let lastTime=parseTime(document.getElementById("t5").value)||parseTime(document.getElementById("t1").value);
  let output="<h3>📡 Future Windows</h3>";
  output+=`<p>Total Stored Spikes: ${history.length}</p>`;
  output+=`<p>Pattern: <b class="${currentVol}">${currentVol.toUpperCase()}</b></p>`;

  for(let i=1;i<=5;i++){
    currentVol=nextVol(currentVol);
    let h=lastTime.h;
    let m=lastTime.m+(i*2);
    let start=format(h,m);
    let end=format(h,m+2);
    let prediction=makeRange(currentVol, history);
    output+=`<p class="${prediction.label}">Window ${i}: <span class="range">${prediction.range}</span><br>Time: ${start} – ${end}</p>`;
  }

  document.getElementById("results").innerHTML=output;
}
</script>

</body>
</html>
